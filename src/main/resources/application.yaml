server:
  port: 8080

spring:
  application:
    name: computer-history-storage

  datasource:
    datasource:
      url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/computer_history}
      username: ${JDBC_DATABASE_USERNAME:history_user}
      password: ${JDBC_DATABASE_PASSWORD:history_password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true