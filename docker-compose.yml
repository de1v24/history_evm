version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: computer_history_db
    environment:
      POSTGRES_USER: history_user
      POSTGRES_PASSWORD: history_password
      POSTGRES_DB: computer_history
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: